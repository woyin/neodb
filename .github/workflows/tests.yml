name: unit test

on:
  push:
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - 'mkdocs.yml'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - 'mkdocs.yml'

permissions:
  contents: read

jobs:
  neodb:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis
        ports:
          - 6379:6379
      db:
        image: postgres
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: test_neodb
        ports:
          - 5432:5432
      db2:
        image: postgres
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: test_neodb_takahe
        ports:
          - 15432:5432
      typesense:
        image: typesense/typesense:30.1
        env:
          TYPESENSE_API_KEY: testpass
          TYPESENSE_DATA_DIR: /data
        ports:
          - 8108:8108
        volumes:
          - ts_data:/data
    strategy:
      max-parallel: 4
      matrix:
        python-version: ['3.14']
    steps:
    - uses: actions/checkout@v5
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
    - name: Install Dependencies
      env:
        UV_PYTHON: ${{ matrix.python-version }}
      run: |
        uv sync -p ${{ matrix.python-version }}
        sudo apt install -y gettext
    - name: Run Tests
      working-directory: neodb
      env:
        UV_PYTHON: ${{ matrix.python-version }}
        NEODB_SECRET_KEY: test
        NEODB_SITE_NAME: test
        NEODB_SITE_DOMAIN: example.org
        NEODB_DB_URL: postgres://testuser:testpass@127.0.0.1/test_neodb
        TAKAHE_DB_URL: postgres://testuser:testpass@127.0.0.1/test_neodb_takahe
        NEODB_REDIS_URL: redis://127.0.0.1:6379/0
        NEODB_SEARCH_URL: typesense://testuser:testpass@127.0.0.1:8108/cat
      run: |
        uv run --project .. python manage.py compilemessages -l zh_Hans
        uv run --project .. python -m pytest -n auto --cov=. --cov-report=term-missing --cov-report=xml
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: neodb/coverage.xml
        flags: neodb
        token: ${{ secrets.CODECOV_TOKEN }}

  takahe:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis
        ports:
          - 6379:6379
      takahe-db:
        image: postgres
        env:
          POSTGRES_USER: takahe
          POSTGRES_PASSWORD: takahe
          POSTGRES_DB: takahe
        ports:
          - 5432:5432
    strategy:
      matrix:
        python-version: ['3.14']
    steps:
    - uses: actions/checkout@v5
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
    - name: Install Dependencies
      env:
        UV_PYTHON: ${{ matrix.python-version }}
      run: |
        sudo apt-get install -y libwebp-dev libjpeg-dev
        uv sync -p ${{ matrix.python-version }}
    - name: Run pytest
      # takahe has no pyproject.toml; uv resolves the unified project
      # at the repo root and runs takahe's tests from its own directory,
      # picking up takahe/pytest.ini.
      working-directory: takahe
      env:
        UV_PYTHON: ${{ matrix.python-version }}
        TAKAHE_DATABASE_SERVER: postgres://takahe:takahe@127.0.0.1:5432/takahe
      run: |
        uv run --project .. python -m pytest --cov=. --cov-report=term-missing --cov-report=xml
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: takahe/coverage.xml
        flags: takahe
        token: ${{ secrets.CODECOV_TOKEN }}
