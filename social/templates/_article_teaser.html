{% load i18n %}
<section class="article-teaser">
  <h4 style="margin-bottom:0.2em">
    <a href="{{ article.url }}">{{ article.title }}</a>
  </h4>
  {% if article.display_summary %}
    <p style="font-style:italic;
              color:var(--pico-muted-color, #888);
              margin:0 0 0.4em 0">{{ article.display_summary }}</p>
  {% endif %}
  <p style="margin:0;
            font-size:0.85em;
            color:var(--pico-muted-color, #888)">
    <small>
      {% blocktrans count counter=article.word_count %}{{ counter }} word{% plural %}{{ counter }} words{% endblocktrans %}
      &middot;
      <a href="{{ article.url }}">{% trans 'Read more' %}</a>
    </small>
  </p>
</section>
