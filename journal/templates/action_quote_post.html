{% load i18n %}
<span>
  <a title="{% trans "Quote" %}"
     hx-get="{% url 'journal:post_quote' post.pk %}"
     hx-swap="outerHTML"
     hx-trigger="click once"
     hx-target="#quote_{{ post.pk }}">
    <i class="fa-solid fa-quote-left"></i>
    {% if quotes_count %}<span class="metrics">{{ quotes_count }}</span>{% endif %}
  </a>
</span>
