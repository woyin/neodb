name: takahe

on:
  push:
    paths:
      - 'takahe/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/takahe.yml'
  pull_request:
    paths:
      - 'takahe/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/takahe.yml'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis
        ports:
          - 6379:6379
      takahe-db:
        image: postgres
        env:
          POSTGRES_USER: takahe
          POSTGRES_PASSWORD: takahe
          POSTGRES_DB: takahe
        ports:
          - 5432:5432
    strategy:
      matrix:
        python-version: ['3.14']
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install Dependencies
        env:
          UV_PYTHON: ${{ matrix.python-version }}
        run: |
          sudo apt-get install -y libwebp-dev libjpeg-dev
          uv sync -p ${{ matrix.python-version }}
      - name: Run pytest
        # takahe has no pyproject.toml; uv resolves the unified project
        # at the repo root and runs takahe's tests from its own directory,
        # picking up takahe/pytest.ini.
        working-directory: takahe
        env:
          UV_PYTHON: ${{ matrix.python-version }}
          TAKAHE_DATABASE_SERVER: postgres://takahe:takahe@127.0.0.1:5432/takahe
        run: |
          uv run --project .. python -m pytest --cov=. --cov-report=term-missing --cov-report=xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: takahe/coverage.xml
          flags: takahe
          token: ${{ secrets.CODECOV_TOKEN }}
