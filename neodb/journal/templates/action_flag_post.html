{% load i18n %}
<span>
  <a title="{% trans "Flag" %}"
     hx-post="{% url 'journal:post_flag' post.pk %}"
     hx-trigger="click"
     hx-prompt="{% trans 'Reason to flag this post.' %}"
     hx-target="body"
     hx-swap="beforeend">
    {% if menu_label %}
      {% trans "Flag" %}
    {% else %}
      <i class="fa-regular fa-flag"></i>
    {% endif %}
  </a>
</span>
