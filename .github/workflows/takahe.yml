name: takahe

on:
  push:
    paths:
      - 'neodb-takahe/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/takahe.yml'
  pull_request:
    paths:
      - 'neodb-takahe/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/takahe.yml'

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.14']
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Run pre-commit
        working-directory: neodb-takahe
        run: |
          git ls-files -z | xargs -0 uvx --with pre_commit pre-commit run --show-diff-on-failure --files

  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis
        ports:
          - 6379:6379
      takahe-db:
        image: postgres
        env:
          POSTGRES_USER: takahe
          POSTGRES_PASSWORD: takahe
          POSTGRES_DB: takahe
        ports:
          - 5432:5432
    strategy:
      matrix:
        python-version: ['3.14']
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install Dependencies
        env:
          UV_PYTHON: ${{ matrix.python-version }}
        run: |
          sudo apt-get install -y libwebp-dev libjpeg-dev
          uv sync -p ${{ matrix.python-version }}
      - name: Run pytest
        # neodb-takahe has no pyproject.toml; uv resolves the unified project
        # at the repo root and runs takahe's tests from its own directory,
        # picking up neodb-takahe/pytest.ini.
        working-directory: neodb-takahe
        env:
          UV_PYTHON: ${{ matrix.python-version }}
          TAKAHE_DATABASE_SERVER: postgres://takahe:takahe@127.0.0.1:5432/takahe
        run: |
          uv run --project .. python -m pytest
